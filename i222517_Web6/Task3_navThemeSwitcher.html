<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Navigation</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --text-color: #333;
            --nav-bg: #ffffff;
            --nav-text: #000;
        }

        [data-theme="dark"] {
            --bg-color: #222222;
            --text-color: #f1f1f1;
            --nav-bg: #111111;
            --nav-text: #ffffff;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
        }

        header {
            background-color: var(--nav-bg);
            color: var(--nav-text);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
        }

        .nav-links {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
        }

        .nav-links li {
            margin: 0 15px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--nav-text);
        }

        .nav-links a:hover {
            color: #007bff;
        }

        .controls {
            display: flex;
            align-items: center;
        }

        .theme-btn {
            background: none;
            border: 1px solid var(--nav-text);
            color: var(--nav-text);
            padding: 5px 10px;
            cursor: pointer;
            margin-right: 15px;
            border-radius: 4px;
        }

        .hamburger {
            display: none;
            font-size: 24px;
            cursor: pointer;
            background: none;
            border: none;
            color: var(--nav-text);
        }

        .hero {
            padding: 50px 20px;
            text-align: center;
        }

        .hero h1 {
            font-size: 36px;
        }

        .cta-btn {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 60px;
                left: 0;
                width: 100%;
                background-color: var(--nav-bg);
                text-align: center;
                padding: 10px 0;
            }

            .nav-links.active {
                display: flex;
            }

            .nav-links li {
                margin: 10px 0;
            }

            .hamburger {
                display: block;
            }

            .theme-btn {
                margin-right: 10px;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">MySite</div>

        <div class="controls">
            <button class="theme-btn" id="themeToggle">🌙</button>
            <button class="hamburger" id="hamburgerMenu">☰</button>
        </div>

        <ul class="nav-links" id="navLinks">
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </header>

    <div class="hero">
        <h1>Welcome to My Website</h1>
        <p>This page demonstrates a responsive navigation bar and a theme switcher.</p>
        <button class="cta-btn">Learn More</button>
    </div>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const hamburgerMenu = document.getElementById('hamburgerMenu');
        const navLinks = document.getElementById('navLinks');

        // Theme Switcher
        const currentTheme = localStorage.getItem('theme') || 'light';
        if (currentTheme === 'dark') {
            document.body.setAttribute('data-theme', 'dark');
            themeToggle.textContent = '☀️';
        }

        themeToggle.addEventListener('click', () => {
            if (document.body.getAttribute('data-theme') === 'dark') {
                document.body.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                themeToggle.textContent = '🌙';
            } else {
                document.body.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                themeToggle.textContent = '☀️';
            }
        });

        // Hamburger Menu
        hamburgerMenu.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });

        window.addEventListener('resize', () => {
            if (window.innerWidth > 768) {
                navLinks.classList.remove('active');
            }
        });
    </script>

</body>

</html>
