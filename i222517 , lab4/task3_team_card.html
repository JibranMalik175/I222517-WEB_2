<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Member Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <!-- Card Container -->
    <div
        class="bg-white p-6 rounded-xl shadow-lg hover:shadow-2xl transition-all duration-300 ease-in-out max-w-2xl w-full flex flex-col md:flex-row items-center md:items-start gap-6 group">

        <!-- Profile Image -->
        <!-- h-24 w-24 (mobile), md:h-32 md:w-32 (desktop)
             rounded-full, hover:scale-105 transition-transform -->
        <div
            class="relative overflow-hidden rounded-full h-24 w-24 md:h-32 md:w-32 flex-shrink-0 border-4 border-gray-200">
            <img src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?ixlib=rb-1.2.1&auto=format&fit=crop&w=400&q=80"
                alt="Jane Doe" class="h-full w-full object-cover transition-transform duration-300 hover:scale-110">
        </div>

        <!-- Content Section -->
        <div class="flex-1 flex flex-col items-center md:items-start text-center md:text-left">

            <!-- Name & Role -->
            <h2 class="text-2xl font-bold text-gray-800">Jane Doe</h2>
            <p class="text-gray-500 font-medium mb-4">Senior Software Engineer</p>

            <!-- Bio -->
            <p class="text-gray-600 mb-6 leading-relaxed">
                Passionate about building scalable web applications and crafting intuitive user experiences.
                Expert in React, Node.js, and cloud architecture. Loves coffee and hiking.
            </p>

            <!-- Social Links -->
            <div class="flex space-x-4">
                <!-- GitHub -->
                <a href="#"
                    class="text-gray-400 hover:text-gray-900 transition-colors transform hover:scale-110 duration-200">
                    <svg class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path fill-rule="evenodd"
                            d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"
                            clip-rule="evenodd" />
                    </svg>
                </a>

                <!-- LinkedIn -->
                <a href="#"
                    class="text-gray-400 hover:text-blue-600 transition-colors transform hover:scale-110 duration-200">
                    <svg class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path fill-rule="evenodd"
                            d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"
                            clip-rule="evenodd" />
                    </svg>
                </a>

                <!-- Portfolio/Globe -->
                <a href="#"
                    class="text-gray-400 hover:text-green-500 transition-colors transform hover:scale-110 duration-200">
                    <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9">
                        </path>
                    </svg>
                </a>
            </div>

        </div>

    </div>

</body>

</html>
