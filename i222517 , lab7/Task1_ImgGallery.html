<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 1: Image Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hide {
            display: none !important;
        }
    </style>
</head>

<body class="bg-gray-100 p-4">
    <h1 class="text-2xl font-bold text-center mb-4">Image Gallery</h1>

    <!-- Filter Buttons -->
    <div id="filter-container" class="flex justify-center gap-2 mb-6">

    </div>

    <!-- Gallery -->
    <div id="gallery" class="grid grid-cols-2 md:grid-cols-3 gap-4">

    </div>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center p-4 hide">
        <div class="bg-white p-4 max-w-lg w-full">
            <button id="close-modal" class="text-red-500 font-bold mb-2 cursor-pointer float-right">Close [X]</button>
            <div class="clear-both"></div>
            <img id="modal-img" src="" alt="Modal Image" class="w-full mb-2 border border-gray-300">
            <h2 id="modal-title" class="text-xl font-bold"></h2>
            <p id="modal-desc" class="text-gray-600"></p>
        </div>
    </div>

    <script>
        const images = [
            { id: 1, category: 'Nature', title: 'Mountain Lake', description: 'A serene lake near the mountains.', imageURL: 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b' },
            { id: 2, category: 'Architecture', title: 'Modern Building', description: 'A modern corporate building.', imageURL: 'https://images.unsplash.com/photo-1486406146926-c627a92ad1ab' },
            { id: 3, category: 'Animals', title: 'Wild Tiger', description: 'A tiger in the jungle.', imageURL: 'https://images.unsplash.com/photo-1549480017-d76466a4b7e8' },
            { id: 4, category: 'Nature', title: 'Forest Path', description: 'A path in the forest.', imageURL: 'https://images.unsplash.com/photo-1441974231531-c6227db76b6e' },
            { id: 5, category: 'Architecture', title: 'Ancient Castle', description: 'An old castle in Europe.', imageURL: 'https://images.unsplash.com/photo-1518709268805-4e9042af9f23' },
            { id: 6, category: 'Animals', title: 'kaatnay wala kutta', description: 'Kaatnay wala kutta enjoying pizza with friends.', imageURL: 'umar.jpeg' }
        ];

        const gallery = document.getElementById('gallery');
        const filterContainer = document.getElementById('filter-container');
        const modal = document.getElementById('modal');
        const modalImg = document.getElementById('modal-img');
        const modalTitle = document.getElementById('modal-title');
        const modalDesc = document.getElementById('modal-desc');
        const closeModal = document.getElementById('close-modal');

        // Extract categories and add "All"
        const categories = ['All', 'Nature', 'Architecture', 'Animals'];

        categories.forEach(category => {
            const btn = document.createElement('button');
            btn.textContent = category;
            btn.className = 'px-3 py-1 bg-blue-500 text-white border border-blue-600 cursor-pointer';

            btn.onclick = () => {
                const filtered = category === 'All' ? images : images.filter(img => img.category === category);
                renderGallery(filtered);
            };

            filterContainer.appendChild(btn);
        });


        renderGallery(images);

        function renderGallery(items) {
            gallery.innerHTML = '';
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'bg-white border border-gray-300 p-2 cursor-pointer';

                const img = document.createElement('img');
                img.src = item.imageURL;
                img.alt = item.title;
                img.className = 'w-full h-48 object-contain mb-2 border border-gray-200 bg-gray-50';

                const title = document.createElement('h3');
                title.className = 'font-bold';
                title.textContent = item.title;

                const categoryBadge = document.createElement('p');
                categoryBadge.className = 'text-sm text-gray-500';
                categoryBadge.textContent = "Category: " + item.category;

                div.appendChild(img);
                div.appendChild(title);
                div.appendChild(categoryBadge);

                div.onclick = () => {
                    modalImg.src = item.imageURL;
                    modalTitle.textContent = item.title;
                    modalDesc.textContent = item.description;
                    modal.classList.remove('hide');
                };

                gallery.appendChild(div);
            });
        }

        closeModal.onclick = () => {
            modal.classList.add('hide');
        };
    </script>
</body>

</html>
